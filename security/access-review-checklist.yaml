version: 1
frequency: quarterly
checks:
  - "Все service accounts имеют только least-privilege роли."
  - "Нет роли editor/owner на runtime аккаунтах приложения."
  - "Lockbox доступ только у runtime сервисов и CI с обоснованием."
  - "KMS key usage журналируется и ревьюится."
  - "SSH доступ к VM ограничен по ключам и списку операторов."
  - "Доступы уволенных сотрудников отозваны."
artifacts:
  - "Экспорт IAM ролей до/после ревью"
  - "Список исключений и сроки устранения"
  - "Подпись владельца системы"
