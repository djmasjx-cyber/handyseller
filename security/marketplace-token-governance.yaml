# Управление сроками токенов маркетплейсов (WB / Ozon / Yandex и т.д.)
version: 1
updated_at: 2026-03-30
owner: operations

what:
  - "Токен — учётные данные API маркетплейса, хранятся у нас зашифрованными; expiresAt задаётся, если площадка отдаёт срок."

alerts:
  - "Ежедневно 01:00 UTC: cron ищет подключения с expiresAt в окне ≤7 дней и уже истёкшие."
  - "При TELEGRAM_ALERT_BOT_TOKEN + TELEGRAM_ALERT_CHAT_ID и TELEGRAM_MARKETPLACE_ALERTS≠0 — сводка в Telegram (ops)."

env:
  TELEGRAM_MARKETPLACE_ALERTS: "по умолчанию включено; выставить 0 чтобы не слать в Telegram"
  MARKETPLACE_EXPIRY_CRON_DISABLED: "1 — отключить сам cron (редко нужно)"

seller:
  - "Получить новый ключ/токен в личном кабинете маркетплейса."
  - "Обновить подключение в HandySeller (настройки маркетплейсов)."

operator:
  - "По алерту: связаться с продавцом, при массовом сбое — объявление в поддержке."
  - "Не запрашивать секреты в открытом чате; направлять в продуктовый сценарий подключения."
