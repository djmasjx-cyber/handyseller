# HandySeller Production: API + Web + Redis. БД — Yandex Managed PostgreSQL (вне контейнеров).
# Запуск на VM: docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# Секреты — из .env.production (не коммитить). JWT_SECRET, ENCRYPTION_KEY, DATABASE_URL задаются при деплое.

services:
  redis:
    image: redis:7-alpine
    container_name: handyseller-redis
    restart: unless-stopped
    volumes:
      - handyseller_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - handyseller

  api:
    image: handyseller-api:latest
    container_name: handyseller-api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: "4000"
      REDIS_HOST: redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - handyseller

  web:
    image: handyseller-web:latest
    container_name: handyseller-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      API_URL: http://api:4000
      TMS_API_URL: http://tms-api:4100
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - handyseller

  tms-api:
    image: handyseller-tms-api:latest
    container_name: handyseller-tms-api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: "4100"
      CORE_API_URL: http://api:4000
    ports:
      - "127.0.0.1:4100:4100"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4100/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - handyseller

networks:
  handyseller:
    driver: bridge

volumes:
  handyseller_redis:
