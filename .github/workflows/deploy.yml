# HandySeller: CI/CD — сборка образов в GitHub, деплой на VM
# Триггер: push в main или ручной запуск (workflow_dispatch)
#
# Секреты в Settings → Secrets and variables → Actions:
#   VM_HOST        — IP или hostname VM (158.160.x.x)
#   VM_SSH_KEY     — приватный SSH-ключ (содержимое, без пароля)
#   VM_USER        — (опционально) пользователь SSH, по умолчанию ubuntu
#
# Одноразовая настройка VM: /opt/handyseller/.env.production, nginx, Docker

name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_api: ${{ steps.meta-api.outputs.tags }}
      image_web: ${{ steps.meta-web.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-web
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # environment: production  # опционально: создать в Settings → Environments для защиты

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.VM_HOST }}" ]; then echo "::error::VM_HOST secret is empty"; exit 1; fi
          if [ -z "${{ secrets.VM_SSH_KEY }}" ]; then echo "::error::VM_SSH_KEY secret is empty"; exit 1; fi

      - name: Prepare VM directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER || 'ubuntu' }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: "sudo mkdir -p /opt/handyseller && sudo chown $(whoami):$(whoami) /opt/handyseller"

      - name: Copy compose and scripts to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER || 'ubuntu' }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.ci.yml,scripts/vm-watchdog.sh,scripts/handyseller-start.sh"
          target: "/opt/handyseller/"

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER || 'ubuntu' }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/handyseller

            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found. Run vm-setup-once.sh on VM first."
              exit 1
            fi

            IMAGE_API="ghcr.io/${{ github.repository_owner }}/handyseller-api:latest"
            IMAGE_WEB="ghcr.io/${{ github.repository_owner }}/handyseller-web:latest"

            # Обновляем только IMAGE_* в .env.production
            grep -v '^IMAGE_API=' .env.production | grep -v '^IMAGE_WEB=' > .env.production.tmp
            echo "IMAGE_API=$IMAGE_API" >> .env.production.tmp
            echo "IMAGE_WEB=$IMAGE_WEB" >> .env.production.tmp
            mv .env.production.tmp .env.production

            if [ -n "${{ secrets.CR_PAT }}" ]; then
              echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            fi

            export IMAGE_API IMAGE_WEB
            chmod +x vm-watchdog.sh handyseller-start.sh 2>/dev/null || true
            docker compose -f docker-compose.ci.yml pull || docker-compose -f docker-compose.ci.yml pull
            docker compose -f docker-compose.ci.yml --env-file .env.production up -d || docker-compose -f docker-compose.ci.yml --env-file .env.production up -d

            [ -f /etc/cron.d/handyseller-watchdog ] || \
              echo "*/2 * * * * root /opt/handyseller/vm-watchdog.sh" | sudo tee /etc/cron.d/handyseller-watchdog
            sudo chmod 644 /etc/cron.d/handyseller-watchdog 2>/dev/null || true

            sudo systemctl reload nginx 2>/dev/null || true
            echo "Deploy complete: https://app.handyseller.ru"
