# HandySeller: CI/CD — сборка образов в GitHub, деплой на VM
# Триггер: push в main или ручной запуск (workflow_dispatch)
#
# Секреты в Settings → Secrets and variables → Actions:
#   VM_HOST        — IP или hostname VM (158.160.x.x)
#   VM_SSH_KEY     — приватный SSH-ключ (содержимое, без пароля)
#   VM_USER        — (опционально) пользователь SSH, по умолчанию ubuntu
#
# Одноразовая настройка VM: /opt/handyseller/.env.production, nginx, Docker

name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_api: ${{ steps.meta-api.outputs.tags }}
      image_web: ${{ steps.meta-web.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-web
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # environment: production  # опционально: создать в Settings → Environments для защиты

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare VM directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: "sudo mkdir -p /opt/handyseller && sudo chown $(whoami):$(whoami) /opt/handyseller"

      - name: Copy compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.ci.yml"
          target: "/opt/handyseller/"

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/handyseller
            export IMAGE_API="ghcr.io/${{ github.repository_owner }}/handyseller-api:latest"
            export IMAGE_WEB="ghcr.io/${{ github.repository_owner }}/handyseller-web:latest"

            if [ -n "${{ secrets.CR_PAT }}" ]; then
              echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            fi

            docker compose -f docker-compose.ci.yml pull
            docker compose -f docker-compose.ci.yml --env-file .env.production up -d

            sudo systemctl reload nginx 2>/dev/null || true
            echo "Deploy complete: https://app.handyseller.ru"
