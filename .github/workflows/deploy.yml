# HandySeller: CI/CD — сборка образов в GitHub, деплой на VM
# Триггер: push в main или ручной запуск (workflow_dispatch)
#
# Секреты в Settings → Secrets and variables → Actions:
#   VM_HOST        — IP или hostname VM (158.160.x.x)
#   VM_SSH_KEY     — приватный ключ в base64: cat ~/.ssh/yandex_vm | base64
#   VM_USER        — (опционально) пользователь SSH, по умолчанию ubuntu
#   CR_PAT         — (опционально) GitHub PAT с read:packages для pull из ghcr.io
#
# Одноразовая настройка VM: /opt/handyseller/.env.production, nginx, Docker

name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# При новом push — отменять предыдущие ранки (один активный на ветку)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=./apps/api/prisma/schema.prisma
      - run: npm run build --workspace=api
      - run: npm run build --workspace=web

  build-and-push:
    needs: verify-build
    runs-on: ubuntu-latest
    outputs:
      image_api: ${{ steps.meta-api.outputs.tags }}
      image_web: ${{ steps.meta-web.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-web
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.VM_HOST }}" ]; then echo "::error::VM_HOST secret is empty"; exit 1; fi
          if [ -z "${{ secrets.VM_SSH_KEY }}" ]; then echo "::error::VM_SSH_KEY secret is empty"; exit 1; fi

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.VM_SSH_KEY }}" | base64 -d > deploy_key.pem
          chmod 600 deploy_key.pem

      - name: Add VM host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare VM directory
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          ssh -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${USER}@${HOST}" \
            "sudo mkdir -p /opt/handyseller && sudo chown \$(whoami):\$(whoami) /opt/handyseller"

      - name: Copy compose and scripts to VM (retry)
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          for i in 1 2 3 4 5; do
            echo "SCP attempt ${i}/5"
            if scp -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
              docker-compose.ci.yml scripts/vm-watchdog.sh scripts/handyseller-start.sh scripts/vm-diagnose.sh \
              "${USER}@${HOST}:/opt/handyseller/"; then
              exit 0
            fi
            sleep $((i * 2))
          done
          echo "::error::SCP failed after 5 attempts"
          exit 1

      - name: Copy nginx configs to VM (retry)
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          for i in 1 2 3 4 5; do
            echo "SCP attempt ${i}/5"
            if scp -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -r nginx \
              "${USER}@${HOST}:/opt/handyseller/"; then
              exit 0
            fi
            sleep $((i * 2))
          done
          echo "::error::SCP failed after 5 attempts"
          exit 1

      - name: Deploy to VM
        shell: bash
        env:
          CR_PAT: ${{ secrets.CR_PAT }}
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          ssh -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${USER}@${HOST}" <<'SSH'
            # Деплой: down → prune → pull → up. Watchdog отключаем на время (иначе гонка: он видит down и делает up).
            set -e
            cd /opt/handyseller

            sudo rm -f /etc/cron.d/handyseller-watchdog
            trap 'echo "*/2 * * * * root /opt/handyseller/vm-watchdog.sh" | sudo tee /etc/cron.d/handyseller-watchdog; sudo chmod 644 /etc/cron.d/handyseller-watchdog' EXIT

            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found. Run vm-setup-once.sh on VM first."
              exit 1
            fi

            IMAGE_API="ghcr.io/${{ github.repository_owner }}/handyseller-api:latest"
            IMAGE_WEB="ghcr.io/${{ github.repository_owner }}/handyseller-web:latest"

            grep -v '^IMAGE_API=' .env.production | grep -v '^IMAGE_WEB=' > .env.production.tmp
            echo "IMAGE_API=$IMAGE_API" >> .env.production.tmp
            echo "IMAGE_WEB=$IMAGE_WEB" >> .env.production.tmp
            mv .env.production.tmp .env.production

            if [ -n "$CR_PAT" ]; then
              echo "$CR_PAT" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            fi

            export IMAGE_API IMAGE_WEB
            chmod +x vm-watchdog.sh handyseller-start.sh 2>/dev/null || true
            DC="docker compose"
            command -v docker-compose >/dev/null 2>&1 && DC="docker-compose"

            # Сеть external — создаём один раз, compose её не создаёт (нет конфликтов с watchdog)
            docker network create handyseller_handyseller 2>/dev/null || true

            echo "=== Disk before ==="
            df -h /

            # 1. Перезапускаем только app-сервисы. Redis сохраняем, чтобы не зависеть
            # от Docker Hub на каждом деплое и не терять прогретый volume/image.
            $DC -f docker-compose.ci.yml --env-file .env.production stop web api || true
            docker rm -f handyseller-web handyseller-api 2>/dev/null || true

            # 2. Очистка: только остановленные контейнеры и dangling images.
            # Не делаем image prune -af, иначе удалим redis-образ и снова упрёмся в Docker Hub.
            docker container prune -f
            docker image prune -f

            echo "=== Disk after prune ==="
            df -h /

            # 3. Pull новых app-образов с retry: сеть на VM бывает нестабильной.
            echo "=== Pulling app images ==="
            for i in 1 2 3 4 5; do
              echo "Pull attempt ${i}/5"
              if $DC -f docker-compose.ci.yml pull api web; then
                break
              fi
              [ $i -eq 5 ] && { echo "Pull failed after 5 attempts"; exit 1; }
              sleep $((i * 5))
            done

            # 5. Запуск. Redis поднимется при необходимости, но в штатном деплое не пересоздаётся.
            $DC -f docker-compose.ci.yml --env-file .env.production up -d redis api web

            trap - EXIT
            echo "*/2 * * * * root /opt/handyseller/vm-watchdog.sh" | sudo tee /etc/cron.d/handyseller-watchdog
            sudo chmod 644 /etc/cron.d/handyseller-watchdog

            if [ -d /opt/handyseller/nginx ]; then
              if sudo test -f /etc/letsencrypt/live/handyseller.ru/fullchain.pem 2>/dev/null; then
                sudo cp /opt/handyseller/nginx/handyseller-domain.conf /etc/nginx/sites-available/handyseller
              elif sudo test -f /etc/letsencrypt/live/app.handyseller.ru/fullchain.pem 2>/dev/null; then
                sudo cp /opt/handyseller/nginx/handyseller-app-ssl.conf /etc/nginx/sites-available/handyseller
              elif [ -f /opt/handyseller/nginx/handyseller-bootstrap.conf ]; then
                sudo cp /opt/handyseller/nginx/handyseller-bootstrap.conf /etc/nginx/sites-available/handyseller
              else
                sudo cp /opt/handyseller/nginx/handyseller.conf /etc/nginx/sites-available/handyseller
              fi
              sudo ln -sf /etc/nginx/sites-available/handyseller /etc/nginx/sites-enabled/
            fi
            sudo nginx -t 2>/dev/null && sudo systemctl reload nginx 2>/dev/null || true

            echo "=== Waiting for containers (up to 90s) ==="
            for i in $(seq 1 30); do
              if curl -sf --connect-timeout 2 http://127.0.0.1:4000/health >/dev/null 2>&1; then
                echo "API healthy after ${i}x3s"
                break
              fi
              [ $i -eq 30 ] && { echo "API not ready after 90s"; docker ps -a; docker logs handyseller-api --tail 80 2>&1; exit 1; }
              sleep 3
            done

            sleep 5
            docker exec handyseller-api node dist/scripts/seed-database.js 2>/dev/null || true

            echo "=== Verify Web ==="
            curl -sf --connect-timeout 5 http://127.0.0.1:3001/ >/dev/null || { echo "Web not responding"; docker logs handyseller-web --tail 30 2>&1; exit 1; }

            echo "Deploy complete: https://app.handyseller.ru"
          SSH
