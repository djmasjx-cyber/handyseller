name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      change_class:
        description: "Release change class"
        required: true
        type: choice
        options:
          - standard
          - high-risk
          - schema-impact
        default: standard
      release_owner:
        description: "Release owner (name or handle)"
        required: true
        type: string
      risk_notes:
        description: "Short risk notes for this release"
        required: false
        type: string

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  governance-check:
    runs-on: ubuntu-latest
    outputs:
      change_class: ${{ steps.meta.outputs.change_class }}
      release_owner: ${{ steps.meta.outputs.release_owner }}
      risk_notes: ${{ steps.meta.outputs.risk_notes }}
    steps:
      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGE_CLASS="${{ github.event.inputs.change_class }}"
            RELEASE_OWNER="${{ github.event.inputs.release_owner }}"
            RISK_NOTES="${{ github.event.inputs.risk_notes }}"
          else
            CHANGE_CLASS="standard"
            RELEASE_OWNER="${{ github.actor }}"
            RISK_NOTES="auto-release from main push"
          fi
          if [ "${CHANGE_CLASS}" = "high-risk" ] || [ "${CHANGE_CLASS}" = "schema-impact" ]; then
            if [ -z "${RISK_NOTES}" ]; then
              echo "::error::risk_notes is required for high-risk/schema-impact releases"
              exit 1
            fi
          fi
          echo "change_class=${CHANGE_CLASS}" >> "$GITHUB_OUTPUT"
          echo "release_owner=${RELEASE_OWNER}" >> "$GITHUB_OUTPUT"
          echo "risk_notes=${RISK_NOTES}" >> "$GITHUB_OUTPUT"

  verify-build-and-lint:
    needs: governance-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx prisma generate --schema=./apps/api/prisma/schema.prisma
      - run: npm run build --workspace=api
      - run: npm run build --workspace=tms-api
      - run: npm run build --workspace=web

  external-carrier-gate:
    needs: [governance-check, verify-build-and-lint]
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        carrier:
          - dellin
          - cdek
          - major-express
    env:
      CLIENT_ID: ${{ secrets.TMS_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.TMS_CLIENT_SECRET }}
      API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.handyseller.ru/api' }}
      PREFERRED_CARRIER_ID: ${{ matrix.carrier }}
      DOWNLOAD_DOC: "false"
      TRACE_ID_PREFIX: preprod-${{ matrix.carrier }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate external gate secrets
        run: |
          if [ -z "${CLIENT_ID}" ] || [ -z "${CLIENT_SECRET}" ]; then
            echo "::error::Missing TMS_CLIENT_ID/TMS_CLIENT_SECRET in staging environment"
            exit 1
          fi
      - name: Run carrier e2e gate
        run: |
          set -euo pipefail
          bash scripts/tms-partner-e2e.sh

  build-and-push-images:
    needs: [governance-check, verify-build-and-lint, external-carrier-gate]
    runs-on: ubuntu-latest
    outputs:
      image_api: ${{ steps.image_refs.outputs.image_api }}
      image_web: ${{ steps.image_refs.outputs.image_web }}
      image_tms_api: ${{ steps.image_refs.outputs.image_tms_api }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-api
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=prod-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Extract metadata for TMS API
        id: meta-tms-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-tms-api
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=prod-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push TMS API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/tms-api/Dockerfile
          push: true
          tags: ${{ steps.meta-tms-api.outputs.tags }}
          labels: ${{ steps.meta-tms-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-web
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=prod-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Export immutable image refs
        id: image_refs
        run: |
          echo "image_api=${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-api:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"
          echo "image_web=${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-web:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"
          echo "image_tms_api=${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-tms-api:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

  deploy-production:
    needs: [governance-check, build-and-push-images]
    runs-on: ubuntu-latest
    environment: production
    outputs:
      previous_image_api: ${{ steps.capture_previous.outputs.prev_image_api }}
      previous_image_web: ${{ steps.capture_previous.outputs.prev_image_web }}
      previous_image_tms_api: ${{ steps.capture_previous.outputs.prev_image_tms_api }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.VM_HOST }}" ]; then echo "::error::VM_HOST secret is empty"; exit 1; fi
          if [ -z "${{ secrets.VM_SSH_KEY }}" ]; then echo "::error::VM_SSH_KEY secret is empty"; exit 1; fi

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.VM_SSH_KEY }}" | base64 -d > deploy_key.pem
          chmod 600 deploy_key.pem

      - name: Add VM host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Capture previous deployment images
        id: capture_previous
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          PREV_API="$(ssh -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${USER}@${HOST}" "grep '^IMAGE_API=' /opt/handyseller/.env.production | cut -d= -f2- || true")"
          PREV_WEB="$(ssh -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${USER}@${HOST}" "grep '^IMAGE_WEB=' /opt/handyseller/.env.production | cut -d= -f2- || true")"
          PREV_TMS="$(ssh -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${USER}@${HOST}" "grep '^IMAGE_TMS_API=' /opt/handyseller/.env.production | cut -d= -f2- || true")"
          echo "prev_image_api=${PREV_API}" >> "$GITHUB_OUTPUT"
          echo "prev_image_web=${PREV_WEB}" >> "$GITHUB_OUTPUT"
          echo "prev_image_tms_api=${PREV_TMS}" >> "$GITHUB_OUTPUT"

      - name: Prepare VM directory
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          ssh -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${USER}@${HOST}" \
            "sudo mkdir -p /opt/handyseller && sudo chown \$(whoami):\$(whoami) /opt/handyseller"

      - name: Copy compose and scripts to VM (retry)
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          for i in 1 2 3 4 5; do
            echo "SCP attempt ${i}/5"
            if scp -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
              docker-compose.ci.yml scripts/vm-watchdog.sh scripts/handyseller-start.sh scripts/vm-diagnose.sh \
              "${USER}@${HOST}:/opt/handyseller/"; then
              exit 0
            fi
            sleep $((i * 2))
          done
          echo "::error::SCP failed after 5 attempts"
          exit 1

      - name: Copy nginx configs to VM (retry)
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          for i in 1 2 3 4 5; do
            echo "SCP attempt ${i}/5"
            if scp -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -r nginx \
              "${USER}@${HOST}:/opt/handyseller/"; then
              exit 0
            fi
            sleep $((i * 2))
          done
          echo "::error::SCP failed after 5 attempts"
          exit 1

      - name: Deploy to VM
        shell: bash
        env:
          CR_PAT: ${{ secrets.CR_PAT }}
          IMAGE_API: ${{ needs.build-and-push-images.outputs.image_api }}
          IMAGE_WEB: ${{ needs.build-and-push-images.outputs.image_web }}
          IMAGE_TMS_API: ${{ needs.build-and-push-images.outputs.image_tms_api }}
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          ssh -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${USER}@${HOST}" \
            "IMAGE_API='${IMAGE_API}' IMAGE_WEB='${IMAGE_WEB}' IMAGE_TMS_API='${IMAGE_TMS_API}' CR_PAT='${CR_PAT}' bash -seu" <<'SSH'
            set -euo pipefail
            CR_PAT="${CR_PAT:-}"
            cd /opt/handyseller

            sudo rm -f /etc/cron.d/handyseller-watchdog
            trap 'echo "*/2 * * * * root /opt/handyseller/vm-watchdog.sh" | sudo tee /etc/cron.d/handyseller-watchdog; sudo chmod 644 /etc/cron.d/handyseller-watchdog' EXIT

            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found. Run vm-setup-once.sh on VM first."
              exit 1
            fi
            # Free disk space before pulling fresh images.
            docker image prune -af >/dev/null 2>&1 || true
            docker builder prune -af >/dev/null 2>&1 || true
            docker container prune -f >/dev/null 2>&1 || true

            grep -v '^IMAGE_API=' .env.production | grep -v '^IMAGE_WEB=' | grep -v '^IMAGE_TMS_API=' > .env.production.tmp
            echo "IMAGE_API=${IMAGE_API}" >> .env.production.tmp
            echo "IMAGE_WEB=${IMAGE_WEB}" >> .env.production.tmp
            echo "IMAGE_TMS_API=${IMAGE_TMS_API}" >> .env.production.tmp
            mv .env.production.tmp .env.production

            if [ -n "$CR_PAT" ]; then
              echo "$CR_PAT" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            fi

            export IMAGE_API IMAGE_WEB IMAGE_TMS_API
            chmod +x vm-watchdog.sh handyseller-start.sh 2>/dev/null || true
            DC="docker compose"
            command -v docker-compose >/dev/null 2>&1 && DC="docker-compose"

            # Сеть external — создаём один раз, compose её не создаёт (нет конфликтов с watchdog)
            docker network create handyseller_handyseller 2>/dev/null || true

            echo "=== Pulling app images (zero-downtime path) ==="
            for i in 1 2 3 4 5; do
              echo "Pull attempt ${i}/5"
              if $DC -f docker-compose.ci.yml pull api web tms-api; then
                break
              fi
              [ $i -eq 5 ] && { echo "Pull failed after 5 attempts"; exit 1; }
              sleep $((i * 5))
            done

            if docker ps -a --format '{{.Names}}' | rg -x 'handyseller-redis' >/dev/null; then
              echo "=== Starting existing Redis container ==="
              docker start handyseller-redis 2>/dev/null || true
            elif docker image inspect redis:7-alpine >/dev/null 2>&1; then
              echo "=== Creating Redis from cached image ==="
              $DC -f docker-compose.ci.yml --env-file .env.production up -d --no-deps redis
            else
              echo "=== Pulling Redis image ==="
              for i in 1 2 3 4 5; do
                echo "Redis pull attempt ${i}/5"
                if docker pull redis:7-alpine; then
                  break
                fi
                [ $i -eq 5 ] && { echo "Redis pull failed after 5 attempts"; exit 1; }
                sleep $((i * 5))
              done
              $DC -f docker-compose.ci.yml --env-file .env.production up -d --no-deps redis
            fi

            # Important: do not stop/remove old containers first.
            # Compose will recreate services to new images with minimal interruption.
            $DC -f docker-compose.ci.yml --env-file .env.production up -d --no-deps api tms-api web

            trap - EXIT
            echo "*/2 * * * * root /opt/handyseller/vm-watchdog.sh" | sudo tee /etc/cron.d/handyseller-watchdog
            sudo chmod 644 /etc/cron.d/handyseller-watchdog

            if [ -d /opt/handyseller/nginx ]; then
              if sudo test -f /etc/letsencrypt/live/handyseller.ru/fullchain.pem 2>/dev/null; then
                sudo cp /opt/handyseller/nginx/handyseller-domain.conf /etc/nginx/sites-available/handyseller
              elif sudo test -f /etc/letsencrypt/live/app.handyseller.ru/fullchain.pem 2>/dev/null; then
                sudo cp /opt/handyseller/nginx/handyseller-app-ssl.conf /etc/nginx/sites-available/handyseller
              elif [ -f /opt/handyseller/nginx/handyseller-bootstrap.conf ]; then
                sudo cp /opt/handyseller/nginx/handyseller-bootstrap.conf /etc/nginx/sites-available/handyseller
              else
                sudo cp /opt/handyseller/nginx/handyseller.conf /etc/nginx/sites-available/handyseller
              fi
              sudo ln -sf /etc/nginx/sites-available/handyseller /etc/nginx/sites-enabled/
            fi
            sudo nginx -t 2>/dev/null && sudo systemctl reload nginx 2>/dev/null || true

            echo "=== Waiting for containers (up to 90s) ==="
            for i in $(seq 1 30); do
              if curl -sf --connect-timeout 2 http://127.0.0.1:4000/health >/dev/null 2>&1; then
                echo "API healthy after ${i}x3s"
                break
              fi
              [ $i -eq 30 ] && { echo "API not ready after 90s"; docker ps -a; docker logs handyseller-api --tail 80 2>&1; exit 1; }
              sleep 3
            done

            sleep 5
            docker exec handyseller-api node dist/scripts/seed-database.js 2>/dev/null || true

            echo "=== Verify Web ==="
            curl -sf --connect-timeout 5 http://127.0.0.1:3001/ >/dev/null || { echo "Web not responding"; docker logs handyseller-web --tail 30 2>&1; exit 1; }
            echo "=== Verify TMS API ==="
            curl -sf --connect-timeout 5 http://127.0.0.1:4100/health >/dev/null || { echo "TMS API not responding"; docker logs handyseller-tms-api --tail 60 2>&1; exit 1; }

            # Post-success cleanup (non-blocking) to avoid disk growth.
            docker image prune -f || true

            echo "Deploy complete: https://app.handyseller.ru"
          SSH

      - name: Post-deploy partner smoke (prod)
        env:
          CLIENT_ID: ${{ secrets.TMS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TMS_CLIENT_SECRET }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.handyseller.ru/api' }}
          PREFERRED_CARRIER_ID: dellin
          DOWNLOAD_DOC: "true"
        run: |
          set -euo pipefail
          bash scripts/tms-partner-e2e.sh

      - name: SLO alert gate (prod)
        env:
          CLIENT_ID: ${{ secrets.TMS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TMS_CLIENT_SECRET }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.handyseller.ru/api' }}
        run: |
          set -euo pipefail
          TOKEN_RESPONSE="$(curl -sS -X POST "${API_BASE_URL}/tms/oauth/token" \
            -H "Content-Type: application/json" \
            -d "{\"grant_type\":\"client_credentials\",\"client_id\":\"${CLIENT_ID}\",\"client_secret\":\"${CLIENT_SECRET}\"}")"
          ACCESS_TOKEN="$(echo "${TOKEN_RESPONSE}" | jq -r '.access_token // empty')"
          if [[ -z "${ACCESS_TOKEN}" ]]; then
            echo "::error::Failed to mint token for SLO check"
            echo "${TOKEN_RESPONSE}"
            exit 1
          fi
          ACCESS_TOKEN="${ACCESS_TOKEN}" API_BASE_URL="${API_BASE_URL}" bash scripts/tms-slo-alert-check.sh

      - name: Rollback previous images on failure
        if: ${{ failure() && steps.capture_previous.outputs.prev_image_api != '' && steps.capture_previous.outputs.prev_image_web != '' && steps.capture_previous.outputs.prev_image_tms_api != '' }}
        shell: bash
        env:
          PREV_IMAGE_API: ${{ steps.capture_previous.outputs.prev_image_api }}
          PREV_IMAGE_WEB: ${{ steps.capture_previous.outputs.prev_image_web }}
          PREV_IMAGE_TMS_API: ${{ steps.capture_previous.outputs.prev_image_tms_api }}
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          ssh -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${USER}@${HOST}" \
            "PREV_IMAGE_API='${PREV_IMAGE_API}' PREV_IMAGE_WEB='${PREV_IMAGE_WEB}' PREV_IMAGE_TMS_API='${PREV_IMAGE_TMS_API}' bash -seu" <<'SSH'
            set -euo pipefail
            cd /opt/handyseller
            grep -v '^IMAGE_API=' .env.production | grep -v '^IMAGE_WEB=' | grep -v '^IMAGE_TMS_API=' > .env.production.tmp
            echo "IMAGE_API=${PREV_IMAGE_API}" >> .env.production.tmp
            echo "IMAGE_WEB=${PREV_IMAGE_WEB}" >> .env.production.tmp
            echo "IMAGE_TMS_API=${PREV_IMAGE_TMS_API}" >> .env.production.tmp
            mv .env.production.tmp .env.production
            DC="docker compose"
            command -v docker-compose >/dev/null 2>&1 && DC="docker-compose"
            $DC -f docker-compose.ci.yml --env-file .env.production pull api web tms-api
            $DC -f docker-compose.ci.yml --env-file .env.production up -d --no-deps api tms-api web
          SSH

      - name: Build release evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cat > release-evidence.md <<EOF
          # Release Evidence

          - Repository: ${{ github.repository }}
          - Run ID: ${{ github.run_id }}
          - Commit SHA: ${{ github.sha }}
          - Trigger: ${{ github.event_name }}
          - Actor: ${{ github.actor }}
          - Change class: ${{ needs.governance-check.outputs.change_class }}
          - Release owner: ${{ needs.governance-check.outputs.release_owner }}
          - Risk notes: ${{ needs.governance-check.outputs.risk_notes }}

          ## Required gates
          - verify-build-and-lint: passed
          - external-carrier-gate: passed
          - deploy-production: completed

          ## Rollback
          - Strategy: restore previous immutable images from .env.production
          - Workflow rollback step: Rollback previous images on failure

          ## Runbook
          - docs/CI-DEPLOY.md
          - docs/ENGINEERING-OPERATING-MODEL.md
          EOF

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ github.run_id }}
          path: release-evidence.md
