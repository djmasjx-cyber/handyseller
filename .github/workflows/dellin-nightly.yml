# Был: ручной E2E в ТК (confirm, заявки). Убрано — в CI не создаём заказы в перевозчиках.
# Скрипты `scripts/tms-*.sh` остаются для локального запуска при необходимости.

name: External Carrier E2E (retired)

on:
  workflow_dispatch:
    inputs:
      carrier:
        description: "Carrier to run in manual mode"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - dellin
          - cdek
          - major-express
  workflow_run:
    workflows: ["Deploy Staging"]
    types: [completed]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  retired:
    runs-on: ubuntu-latest
    steps:
      - name: Retired (no carrier calls)
        run: |
          echo "This workflow is retired. GitHub Actions no longer run TMS/carrier E2E or test orders."
          echo "Use production client → HandySeller → carrier flow for integration validation."
