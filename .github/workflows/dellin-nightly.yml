name: External Carrier E2E

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:
    inputs:
      carrier:
        description: "Carrier to run in manual mode"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - dellin
          - cdek
          - major-express
  # Раньше: после каждого успешного Deploy Staging автоматически шли 3× partner E2E (dellin+cdek+major) с confirm в ТК.
  # Убрано: иначе каждый деплой dev создавал реальные заявки у перевозчиков. Оставлены cron и ручной запуск.

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  external-carrier-e2e:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        carrier: ${{ fromJSON(
          (github.event_name == 'workflow_dispatch' && github.event.inputs.carrier == 'dellin' && '["dellin"]')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.carrier == 'cdek' && '["cdek"]')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.carrier == 'major-express' && '["major-express"]')
          || '["dellin","cdek","major-express"]'
          ) }}
    env:
      CLIENT_ID: ${{ secrets.TMS_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.TMS_CLIENT_SECRET }}
      API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.handyseller.ru/api' }}
      PREFERRED_CARRIER_ID: ${{ matrix.carrier }}
      DOWNLOAD_DOC: "true"
      TRACE_ID_PREFIX: external-${{ matrix.carrier }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate external e2e secrets
        run: |
          if [ -z "${CLIENT_ID}" ] || [ -z "${CLIENT_SECRET}" ]; then
            echo "::error::Missing TMS_CLIENT_ID/TMS_CLIENT_SECRET in staging environment"
            exit 1
          fi

      - name: Run external e2e (capture logs)
        run: |
          set -euo pipefail
          bash scripts/tms-partner-e2e.sh 2>&1 | tee external-${{ matrix.carrier }}.log

      - name: Upload external e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-e2e-${{ matrix.carrier }}-${{ github.run_id }}
          path: |
            external-${{ matrix.carrier }}.log
            /tmp/tms-smoke-doc.bin
          if-no-files-found: ignore
