name: Release Gate (PR -> main)

on:
  pull_request:
    branches: [main]

concurrency:
  group: release-gate-main-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx prisma generate --schema=./apps/api/prisma/schema.prisma
      - run: npm run build --workspace=api
      - run: npm run build --workspace=tms-api
      - run: npm run quality:wms
      - run: npm run build --workspace=web
