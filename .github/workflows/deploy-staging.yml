name: Deploy Staging

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    outputs:
      image_api: ${{ steps.image_refs.outputs.image_api }}
      image_web: ${{ steps.image_refs.outputs.image_web }}
      image_tms_api: ${{ steps.image_refs.outputs.image_tms_api }}
      image_wms_api: ${{ steps.image_refs.outputs.image_wms_api }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-api
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=staging-latest,enable=true

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - id: meta-tms-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-tms-api
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=staging-latest,enable=true

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/tms-api/Dockerfile
          push: true
          tags: ${{ steps.meta-tms-api.outputs.tags }}
          labels: ${{ steps.meta-tms-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - id: meta-wms-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-wms-api
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=staging-latest,enable=true

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/wms-api/Dockerfile
          push: true
          tags: ${{ steps.meta-wms-api.outputs.tags }}
          labels: ${{ steps.meta-wms-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-web
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=staging-latest,enable=true

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Export immutable image refs
        id: image_refs
        run: |
          echo "image_api=${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-api:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"
          echo "image_web=${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-web:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"
          echo "image_tms_api=${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-tms-api:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"
          echo "image_wms_api=${{ env.REGISTRY }}/${{ github.repository_owner }}/handyseller-wms-api:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    needs: build-images
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.VM_HOST }}" ]; then echo "::error::staging VM_HOST is empty"; exit 1; fi
          if [ -z "${{ secrets.VM_SSH_KEY }}" ]; then echo "::error::staging VM_SSH_KEY is empty"; exit 1; fi

      - name: Prepare SSH key and known_hosts
        run: |
          echo "${{ secrets.VM_SSH_KEY }}" | base64 -d > deploy_key.pem
          chmod 600 deploy_key.pem
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy compose and nginx configs to staging VM
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          ssh -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "${USER}@${HOST}" \
            "sudo mkdir -p /opt/handyseller && sudo chown \$(whoami):\$(whoami) /opt/handyseller"
          scp -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -r \
            docker-compose.ci.yml nginx \
            "${USER}@${HOST}:/opt/handyseller/"

      - name: Deploy to staging VM
        shell: bash
        env:
          CR_PAT: ${{ secrets.CR_PAT }}
          IMAGE_API: ${{ needs.build-images.outputs.image_api }}
          IMAGE_WEB: ${{ needs.build-images.outputs.image_web }}
          IMAGE_TMS_API: ${{ needs.build-images.outputs.image_tms_api }}
          IMAGE_WMS_API: ${{ needs.build-images.outputs.image_wms_api }}
        run: |
          set -euo pipefail
          HOST="${{ secrets.VM_HOST }}"
          USER="${{ secrets.VM_USER || 'ubuntu' }}"
          ssh -i deploy_key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${USER}@${HOST}" \
            "IMAGE_API='${IMAGE_API}' IMAGE_WEB='${IMAGE_WEB}' IMAGE_TMS_API='${IMAGE_TMS_API}' IMAGE_WMS_API='${IMAGE_WMS_API}' CR_PAT='${CR_PAT}' bash -seu" <<'SSH'
            set -euo pipefail
            CR_PAT="${CR_PAT:-}"
            APP_DIR="/opt/handyseller"
            ENV_FILE=".env.staging"
            cd "${APP_DIR}"
            if [ ! -f "${ENV_FILE}" ]; then
              echo "ERROR: ${APP_DIR}/${ENV_FILE} not found"
              exit 1
            fi
            # Keep staging online during deploy: avoid compose down/system prune --volumes.
            # Use lightweight cleanup only; services are recreated in-place below.
            df -h /
            docker image prune -af >/dev/null 2>&1 || true
            docker builder prune -af >/dev/null 2>&1 || true
            docker container prune -f >/dev/null 2>&1 || true
            df -h /
            if [ -n "${CR_PAT}" ]; then
              echo "${CR_PAT}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            fi
            grep -v '^IMAGE_API=' "${ENV_FILE}" | grep -v '^IMAGE_WEB=' | grep -v '^IMAGE_TMS_API=' | grep -v '^IMAGE_WMS_API=' | grep -v '^APP_ENV_FILE=' > "${ENV_FILE}.tmp"
            echo "IMAGE_API=${IMAGE_API}" >> "${ENV_FILE}.tmp"
            echo "IMAGE_WEB=${IMAGE_WEB}" >> "${ENV_FILE}.tmp"
            echo "IMAGE_TMS_API=${IMAGE_TMS_API}" >> "${ENV_FILE}.tmp"
            echo "IMAGE_WMS_API=${IMAGE_WMS_API}" >> "${ENV_FILE}.tmp"
            echo "APP_ENV_FILE=${ENV_FILE}" >> "${ENV_FILE}.tmp"
            mv "${ENV_FILE}.tmp" "${ENV_FILE}"
            export IMAGE_API IMAGE_WEB IMAGE_TMS_API IMAGE_WMS_API APP_ENV_FILE="${ENV_FILE}"
            DC="docker compose"
            command -v docker-compose >/dev/null 2>&1 && DC="docker-compose"
            docker network create handyseller_handyseller 2>/dev/null || true
            free_mb() {
              df --output=avail -Bm / | tail -1 | tr -dc '0-9'
            }
            ensure_disk_headroom() {
              local min_mb="${1:-1200}"
              local avail
              avail="$(free_mb)"
              if [ "${avail}" -ge "${min_mb}" ]; then
                return 0
              fi
              echo "Low disk space (${avail}MB). Running emergency cleanup..."
              docker system df || true
              docker image prune -af >/dev/null 2>&1 || true
              docker builder prune -af >/dev/null 2>&1 || true
              docker container prune -f >/dev/null 2>&1 || true
              docker volume prune -f >/dev/null 2>&1 || true
              sudo -n journalctl --vacuum-size=200M >/dev/null 2>&1 || true
              sudo -n rm -rf /var/cache/apt/archives/*.deb >/dev/null 2>&1 || true
              sudo -n apt-get clean >/dev/null 2>&1 || true
              df -h /
            }
            ensure_disk_headroom 1200
            pull_with_fallback() {
              local svc="$1"
              local cname="$2"
              local old_image=""
              old_image="$(docker inspect "${cname}" --format '{{.Image}}' 2>/dev/null || true)"
              ensure_disk_headroom 1200
              for i in 1 2 3; do
                echo "Image pull attempt ${i}/3 service=${svc}"
                if $DC -f docker-compose.ci.yml --env-file "${ENV_FILE}" pull "${svc}"; then
                  return 0
                fi
                echo "Pull failed for ${svc}; running emergency cleanup and retrying..."
                ensure_disk_headroom 1200
                if [ "${i}" -eq 2 ]; then
                  echo "Low-space fallback for ${svc}: recycle old container/image."
                  docker stop "${cname}" >/dev/null 2>&1 || true
                  docker rm "${cname}" >/dev/null 2>&1 || true
                  if [ -n "${old_image}" ]; then
                    docker image rm -f "${old_image}" >/dev/null 2>&1 || true
                  fi
                  ensure_disk_headroom 1200
                fi
                [ "${i}" -eq 3 ] && { echo "Image pull failed after retries service=${svc}"; return 1; }
                sleep $((i * 5))
              done
              return 1
            }
            pull_with_fallback api handyseller-api || exit 1
            pull_with_fallback tms-api handyseller-tms-api || exit 1
            pull_with_fallback wms-api handyseller-wms-api || exit 1
            pull_with_fallback web handyseller-web || exit 1
            $DC -f docker-compose.ci.yml --env-file "${ENV_FILE}" up -d --no-deps redis
            $DC -f docker-compose.ci.yml --env-file "${ENV_FILE}" up -d --no-deps api tms-api wms-api web
            for i in $(seq 1 30); do
              curl -sf --connect-timeout 3 http://127.0.0.1:4000/health >/dev/null && break
              [ "$i" -eq 30 ] && { echo "API health check timeout"; exit 1; }
              sleep 3
            done
            for i in $(seq 1 30); do
              curl -sf --connect-timeout 3 http://127.0.0.1:4100/health >/dev/null && break
              [ "$i" -eq 30 ] && { echo "TMS API health check timeout"; exit 1; }
              sleep 3
            done
            for i in $(seq 1 30); do
              curl -sf --connect-timeout 3 http://127.0.0.1:4200/health >/dev/null && break
              [ "$i" -eq 30 ] && { echo "WMS API health check timeout"; docker logs handyseller-wms-api --tail 80 2>&1 || true; exit 1; }
              sleep 3
            done
            if sudo test -f /etc/letsencrypt/live/dev.handyseller.ru/fullchain.pem && [ -f nginx/handyseller-dev-ssl.conf ]; then
              sudo cp nginx/handyseller-dev-ssl.conf /etc/nginx/sites-available/handyseller-dev
              sudo ln -sf /etc/nginx/sites-available/handyseller-dev /etc/nginx/sites-enabled/handyseller-dev
              sudo nginx -t
              sudo systemctl reload nginx
            else
              echo "WARN: dev.handyseller.ru SSL cert or nginx config missing; public dev smoke may fail"
            fi
          SSH

      - name: Staging fast smoke
        env:
          CLIENT_ID: ${{ secrets.TMS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TMS_CLIENT_SECRET }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://dev.handyseller.ru/api' }}
        run: |
          set -euo pipefail
          bash scripts/tms-fast-smoke.sh

      - name: Staging registry smoke
        env:
          CLIENT_ID: ${{ secrets.TMS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TMS_CLIENT_SECRET }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://dev.handyseller.ru/api' }}
        run: |
          set -euo pipefail
          TOKEN_RESPONSE="$(curl -sS -X POST "${API_BASE_URL}/tms/oauth/token" \
            -H "Content-Type: application/json" \
            -d "{\"grant_type\":\"client_credentials\",\"client_id\":\"${CLIENT_ID}\",\"client_secret\":\"${CLIENT_SECRET}\"}")"
          TMS_ACCESS_TOKEN="$(echo "${TOKEN_RESPONSE}" | jq -r '.access_token // empty')"
          if [[ -z "${TMS_ACCESS_TOKEN}" ]]; then
            echo "::error::Failed to mint staging token for registry smoke"
            echo "${TOKEN_RESPONSE}"
            exit 1
          fi
          TMS_BASE_URL="${API_BASE_URL}/tms" TMS_ACCESS_TOKEN="${TMS_ACCESS_TOKEN}" bash scripts/tms-registry-smoke.sh

      - name: Staging demo checkout smoke
        env:
          WEB_BASE_URL: ${{ vars.WEB_BASE_URL || 'https://dev.handyseller.ru' }}
          REAL_CONFIRM: "false"
        run: |
          set -euo pipefail
          bash scripts/tms-demo-checkout-smoke.sh

      - name: Staging carrier document smoke
        env:
          CLIENT_ID: ${{ secrets.TMS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TMS_CLIENT_SECRET }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://dev.handyseller.ru/api' }}
          PREFERRED_CARRIER_ID: ${{ vars.STAGING_DOCUMENT_CARRIER_ID || 'dellin' }}
          DOWNLOAD_DOC: "true"
          REQUIRE_DOCUMENT_TYPE: "LABEL"
          REQUIRE_ORIGINAL_DOC: "true"
          ALLOW_UNSUPPORTED_REFRESH: "true"
          TRACE_ID_PREFIX: staging-doc
        run: |
          set -euo pipefail
          bash scripts/tms-partner-e2e.sh
