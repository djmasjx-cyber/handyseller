# HandySeller: app.handyseller.ru with SSL
# 301 redirects: handyseller.ru, www.handyseller.ru -> https://app.handyseller.ru
# Сертификат: app.handyseller.ru (включает handyseller.ru, www.handyseller.ru)

upstream api {
    server 127.0.0.1:4000;
}

upstream web {
    server 127.0.0.1:3001;
}

# HTTP -> HTTPS redirect for api subdomain
server {
    listen 80;
    listen [::]:80;
    server_name api.handyseller.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }
    location / {
        return 301 https://api.handyseller.ru$request_uri;
    }
}

# HTTP -> HTTPS redirect for site domains
server {
    listen 80;
    listen [::]:80;
    server_name handyseller.ru www.handyseller.ru app.handyseller.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }
    location / {
        return 301 https://app.handyseller.ru$request_uri;
    }
}

# HTTPS: Redirect handyseller.ru and www -> app.handyseller.ru
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name handyseller.ru www.handyseller.ru;

    ssl_certificate /etc/letsencrypt/live/app.handyseller.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.handyseller.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://app.handyseller.ru$request_uri;
}

# HTTPS: Main app server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.handyseller.ru;

    ssl_certificate /etc/letsencrypt/live/app.handyseller.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.handyseller.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # TMS BFF в Next.js — см. nginx/handyseller.conf
    location ^~ /api/tms/ {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    location ^~ /api/wms/ {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS: API domain (canonical partner API host)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.handyseller.ru;

    ssl_certificate /etc/letsencrypt/live/app.handyseller.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.handyseller.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Keep the same API routing logic as app domain.
    location ^~ /api/tms/ {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    location ^~ /api/wms/ {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    location / {
        return 301 https://app.handyseller.ru$request_uri;
    }
}
