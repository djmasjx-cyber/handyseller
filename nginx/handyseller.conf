# HandySeller: reverse proxy
# /api -> NestJS :4000, остальное -> Next.js :3001
# Запуск: nginx на порту 3000, Next.js на 3001

upstream api {
    server 127.0.0.1:4000;
}

upstream web {
    server 127.0.0.1:3001;
}

server {
    listen 3000;
    server_name _;

    # API — NestJS. proxy_pass без URI: полный путь /api/... передаётся без изменений.
    # Явно пробрасываем Authorization (nginx может не передавать по умолчанию).
    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    # Web — Next.js
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
