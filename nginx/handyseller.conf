# HandySeller: reverse proxy
# /api/tms/* -> Next.js BFF (прокси на Nest / tms-api), остальной /api -> NestJS :4000, остальное -> Next.js :3001
# Запуск: nginx на порту 3000, Next.js на 3001

upstream api {
    server 127.0.0.1:4000;
}

upstream web {
    server 127.0.0.1:3001;
}

server {
    listen 3000;
    server_name _;

    # TMS BFF в Next.js (app/api/tms/[...path]). Без этого POST /api/tms/core/... попадает в Nest и даёт Cannot POST.
    location ^~ /api/tms/ {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    # API — NestJS. proxy_pass без URI: полный путь /api/... передаётся без изменений.
    # Явно пробрасываем Authorization (nginx может не передавать по умолчанию).
    location ^~ /api/wms/ {
        client_max_body_size 25m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
    }

    # Web — Next.js
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
