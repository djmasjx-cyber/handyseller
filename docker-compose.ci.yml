# Для CI: образы из ghcr.io. IMAGE_API, IMAGE_WEB, IMAGE_TMS_API задаются при деплое.
# Сеть external — создаётся один раз, переиспользуется (деплой + watchdog без конфликтов).
# Использование: IMAGE_API=... IMAGE_WEB=... APP_ENV_FILE=.env.staging docker compose -f docker-compose.ci.yml up -d

services:
  redis:
    image: redis:7-alpine
    container_name: handyseller-redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - handyseller_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - handyseller

  api:
    image: ${IMAGE_API}
    container_name: handyseller-api
    restart: unless-stopped
    env_file: ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: "4000"
      REDIS_HOST: redis
      NODE_OPTIONS: "--max-old-space-size=384"
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - handyseller

  web:
    image: ${IMAGE_WEB}
    container_name: handyseller-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      # BFF (app/api/*) ходит в Nest из контейнера web: localhost:4000 — это сам web, не API.
      API_URL: http://api:4000
      TMS_API_URL: http://tms-api:4100
      WMS_API_URL: http://wms-api:4200
      NODE_OPTIONS: "--max-old-space-size=256"
      # DaData: только серверный Route Handler `/api/address-suggest`, в браузер не попадает.
      # Значения из `--env-file .env.production` (или `.env.extra`, см. docs/SECRETS.md).
      DADATA_TOKEN: ${DADATA_TOKEN:-}
      DADATA_API_KEY: ${DADATA_API_KEY:-}
      DADATA_SECRET: ${DADATA_SECRET:-}
      # Temporary checkout demo BFF credentials; server-side only, never exposed to browser bundles.
      TMS_DEMO_CLIENT_ID: ${TMS_DEMO_CLIENT_ID:-}
      TMS_DEMO_CLIENT_SECRET: ${TMS_DEMO_CLIENT_SECRET:-}
      TMS_DEMO_ORIGIN_LABEL: ${TMS_DEMO_ORIGIN_LABEL:-}
      TMS_DEMO_SHIPPER_NAME: ${TMS_DEMO_SHIPPER_NAME:-}
      TMS_DEMO_SHIPPER_PHONE: ${TMS_DEMO_SHIPPER_PHONE:-}
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - handyseller

  tms-api:
    image: ${IMAGE_TMS_API}
    container_name: handyseller-tms-api
    restart: unless-stopped
    env_file: ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: "4100"
      CORE_API_URL: http://api:4000
      NODE_OPTIONS: "--max-old-space-size=256"
    ports:
      - "127.0.0.1:4100:4100"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4100/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - handyseller

  wms-api:
    image: ${IMAGE_WMS_API}
    container_name: handyseller-wms-api
    restart: unless-stopped
    env_file: ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: "4200"
      CORE_API_URL: http://api:4000
      TMS_API_URL: http://tms-api:4100
      NODE_OPTIONS: "--max-old-space-size=256"
    ports:
      - "127.0.0.1:4200:4200"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4200/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - handyseller

networks:
  handyseller:
    name: handyseller_handyseller
    external: true

volumes:
  handyseller_redis:
