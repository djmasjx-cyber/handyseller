version: '3.8'
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://handyseller_user:password@db:5432/handyseller
      JWT_SECRET: change-me
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: handyseller_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: handyseller
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handyseller_user"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
